sonar.projectKey=full-stack-dev-johncastrosanabria_FlaskApiProduct
sonar.projectName=FlaskApiProduct
sonar.projectVersion=3.0.0
sonar.organization=full-stack-dev-johncastrosanabria

# Source code location
sonar.sources=app,client/src
sonar.exclusions=**/__pycache__/**,**/node_modules/**,**/dist/**,.venv/**

# Python configuration
sonar.python.version=3.8

# TypeScript configuration
sonar.typescript.lcov.reportPaths=client/coverage/lcov.info

# Test coverage
sonar.coverage.exclusions=tests/**,client/src/**/*.test.ts

# Code coverage reports
sonar.python.coverage.reportPaths=coverage.xml
